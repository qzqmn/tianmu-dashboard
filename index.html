<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天幕 Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 天幕 Dashboard</h1>
            <p class="subtitle">即時數據面板</p>
        </header>

        <div class="dashboard-grid">
            <!-- 天氣面板 -->
            <section class="card weather-card">
                <div class="card-header">
                    <h2>🌤️ 天氣</h2>
                    <span class="last-updated update-time" id="weather-time"></span>
                </div>
                <div class="weather-grid" id="weather-data">
                    <div class="weather-item loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </section>

            <!-- 匯率面板 -->
            <section class="card forex-card">
                <div class="card-header">
                    <h2>💱 匯率</h2>
                    <span class="last-updated update-time" id="forex-time"></span>
                </div>
                <div class="forex-grid" id="forex-data">
                    <div class="forex-item loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </section>

            <!-- 股票面板 -->
            <section class="card stock-card">
                <div class="card-header">
                    <h2>📈 股票</h2>
                    <span class="last-updated update-time" id="stock-time"></span>
                </div>
                <div class="stock-search-bar">
                    <input type="text" id="stock-input" placeholder="輸入股票代碼，如：AAPL、9988.HK" maxlength="20">
                    <button class="stock-search-btn" id="stock-search-btn" onclick="searchStock()">查詢</button>
                </div>
                <div class="stock-search-result" id="stock-search-result" style="display:none;"></div>
                <div class="stock-grid" id="stock-data">
                    <div class="stock-item loading"><div class="spinner"></div></div>
                </div>
            </section>

            <!-- 加密貨幣面板 -->
            <section class="card crypto-card">
                <div class="card-header">
                    <h2>💰 加密貨幣</h2>
                    <div class="crypto-header-right">
                        <span class="last-updated update-time" id="crypto-time"></span>
                        <div class="crypto-controls">
                            <select id="crypto-sort">
                                <option value="volume">按24h交易量</option>
                                <option value="marketcap">按市值</option>
                            </select>
                            <button class="refresh-btn" onclick="fetchAllData()">🔄</button>
                        </div>
                    </div>
                </div>
                <div class="table-container">
                    <table class="crypto-table">
                        <thead>
                            <tr>
                                <th>幣種</th>
                                <th>價格 (USD)</th>
                                <th>24h 變化</th>
                            </tr>
                        </thead>
                        <tbody id="crypto-data">
                            <tr><td colspan="3" style="text-align: center;"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 新聞面板 -->
            <section class="card news-card">
                <div class="card-header">
                    <h2>📰 新聞</h2>
                    <span class="last-updated update-time" id="news-time"></span>
                </div>
                <div class="news-tabs">
                    <button class="tab-btn active" data-tab="world">國際新聞</button>
                    <button class="tab-btn" data-tab="hk">香港新聞</button>
                    <button class="tab-btn" data-tab="tech">科技趨勢</button>
                    <button class="tab-btn" data-tab="crypto">加密貨幣</button>
                    <button class="tab-btn" data-tab="business">財經商業</button>
                </div>
                <div class="news-content" id="news-data">
                    <ul class="news-list">
                        <li class="loading"><div class="spinner"></div></li>
                    </ul>
                </div>
            </section>

            <!-- 股票總覽 -->
            <section class="card portfolio-card" id="portfolio-section">
                <h2>📊 股票總覽</h2>
                <div id="portfolio-data">
                    <div class="portfolio-summary" id="portfolio-summary">
                        <div class="summary-item total">
                            <span class="label">總市值</span>
                            <span class="value" id="total-value">--</span>
                        </div>
                        <div class="summary-item cost">
                            <span class="label">總成本</span>
                            <span class="value" id="total-cost">--</span>
                        </div>
                        <div class="summary-item profit">
                            <span class="label">總盈虧</span>
                            <span class="value" id="total-pnl">--</span>
                        </div>
                    </div>
                    <div class="portfolio-list" id="portfolio-list">
                        <table class="portfolio-table">
                            <thead>
                                <tr>
                                    <th>股票</th>
                                    <th>持股</th>
                                    <th>成本</th>
                                    <th>現價</th>
                                    <th>市值</th>
                                    <th>盈虧</th>
                                </tr>
                            </thead>
                            <tbody id="portfolio-tbody">
                                <tr><td colspan="6" class="loading"><div class="spinner"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>

        <!-- 全局 Loading Overlay -->
        <div class="loading-overlay" id="loading-overlay" style="display: none;">
            <div class="spinner large"></div>
        </div>

        <!-- 錯誤 Modal -->
        <div class="error-modal" id="error-modal" style="display: none;">
            <div class="error-content">
                <h3>❌ 錯誤</h3>
                <p id="error-message">無法載入數據</p>
                <button onclick="retryAll()">重試</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
